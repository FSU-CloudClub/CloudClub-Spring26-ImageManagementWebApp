AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  backend

  Sample SAM Template for backend

# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
  Function:
    Timeout: 3

    Tracing: Active
    # You can add LoggingConfig parameters such as the Logformat, Log Group, and SystemLogLevel or ApplicationLogLevel. Learn more here https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/sam-resource-function.html#sam-function-loggingconfig.
    LoggingConfig:
      LogFormat: JSON
  Api:
    TracingEnabled: true

Parameters:
  TableName:
    Type: String
    Description: Name of the existing DynamoDB table
  BucketName:
    Type: String
    Description: Name of the existing S3 bucket
  GSIName:
    Type: String
    Default: userId-uploadedAt-index
    Description: Name of the GSI on the DynamoDB table

Resources:
  BackendFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: app.lambda_handler
      Runtime: python3.13
      Architectures:
        - x86_64
      Environment:
        Variables:
          TABLE_NAME: !Ref TableName
          BUCKET_NAME: !Ref BucketName
          GSI_NAME: !Ref GSIName
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName
        - S3CrudPolicy:
            BucketName: !Ref BucketName
      Events:
        Backend:
          Type: Api # More info about API Event Source: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#api
          Properties:
            Path: /health
            Method: get
        GetImageMetadata:
          Type: Api
          Properties:
            Path: /images/{imageId}
            Method: get
        UpateImage:
          Type: Api
          Properties:
            Path: /update-metadata
            Method: patch
        ListImages:
          Type: Api
          Properties:
            Path: /images
            Method: get
        DeleteImage:
          Type: Api
          Properties:
            Path: /image/<image_id>
            Method: delete
  ApplicationResourceGroup:
    Type: AWS::ResourceGroups::Group
    Properties:
      Name:
        Fn::Sub: ApplicationInsights-SAM-${AWS::StackName}
      ResourceQuery:
        Type: CLOUDFORMATION_STACK_1_0
  ApplicationInsightsMonitoring:
    Type: AWS::ApplicationInsights::Application
    Properties:
      ResourceGroupName:
        Ref: ApplicationResourceGroup
      AutoConfigurationEnabled: "true"
Outputs:
  BackendApi:
    Description: API Gateway endpoint URL for Prod stage
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/"
  BackendFunction:
    Description: Backend Lambda Function ARN
    Value: !GetAtt BackendFunction.Arn
  BackendFunctionIamRole:
    Description: Implicit IAM Role created for Backend function
    Value: !GetAtt BackendFunctionRole.Arn
  ImageBucketName:
    Description: S3 bucket for image uploads
    Value: !Ref BucketName
  ImageMetadataTableName:
    Description: DynamoDB table for image metadata
    Value: !Ref TableName
